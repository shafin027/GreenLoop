<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GreenLoop</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <script>
      window.addEventListener('error', function(event) {
        var errorDiv = document.getElementById('global-error-overlay');
        if (!errorDiv) {
          errorDiv = document.createElement('div');
          errorDiv.id = 'global-error-overlay';
          errorDiv.style.position = 'fixed';
          errorDiv.style.top = '0';
          errorDiv.style.left = '0';
          errorDiv.style.width = '100%';
          errorDiv.style.height = '100%';
          errorDiv.style.backgroundColor = 'rgba(10, 10, 10, 0.98)';
          errorDiv.style.color = '#ff4d4d';
          errorDiv.style.padding = '30px';
          errorDiv.style.fontFamily = 'Consolas, Monaco, monospace';
          errorDiv.style.zIndex = '999999';
          errorDiv.style.overflow = 'auto';
          errorDiv.style.fontSize = '14px';
          errorDiv.style.lineHeight = '1.5';
          document.body.appendChild(errorDiv);
        }
        errorDiv.innerHTML = '<h1 style="color: #ff3333; margin-top: 0; font-size: 24px;">🔴 Client-Side Javascript Error</h1>' +
          '<p><strong>Message:</strong> ' + event.message + '</p>' +
          '<p><strong>Filename:</strong> ' + event.filename + '</p>' +
          '<p><strong>Line:</strong> ' + event.lineno + ':' + event.colno + '</p>' +
          '<pre style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; border: 1px border rgba(255,255,255,0.1); overflow-x: auto;">' + (event.error ? event.error.stack : '') + '</pre>';
      });
      window.addEventListener('unhandledrejection', function(event) {
        var errorDiv = document.getElementById('global-error-overlay');
        if (!errorDiv) {
          errorDiv = document.createElement('div');
          errorDiv.id = 'global-error-overlay';
          errorDiv.style.position = 'fixed';
          errorDiv.style.top = '0';
          errorDiv.style.left = '0';
          errorDiv.style.width = '100%';
          errorDiv.style.height = '100%';
          errorDiv.style.backgroundColor = 'rgba(10, 10, 10, 0.98)';
          errorDiv.style.color = '#ff9f43';
          errorDiv.style.padding = '30px';
          errorDiv.style.fontFamily = 'Consolas, Monaco, monospace';
          errorDiv.style.zIndex = '999999';
          errorDiv.style.overflow = 'auto';
          errorDiv.style.fontSize = '14px';
          errorDiv.style.lineHeight = '1.5';
          document.body.appendChild(errorDiv);
        }
        var reason = event.reason || {};
        errorDiv.innerHTML = '<h1 style="color: #ff9f43; margin-top: 0; font-size: 24px;">⚠️ Unhandled Promise Rejection</h1>' +
          '<p><strong>Reason:</strong> ' + (reason.message || reason) + '</p>' +
          '<pre style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; border: 1px border rgba(255,255,255,0.1); overflow-x: auto;">' + (reason.stack || '') + '</pre>';
      });
    </script>

    <link rel="stylesheet" crossorigin href="/assets/index-V0EUwEWU.css">
  </head>

    <div id="root"></div>
  </body>
</html>
